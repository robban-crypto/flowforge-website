<!DOCTYPE html>
<html lang="en">
<head>
    <title>FlowForge AI Toolkit</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            background: #0f1221;
            color: white;
            line-height: 1.6;
        }

        /* HERO */
        .hero {
            max-width: 1100px;
            margin: 20px auto 10px auto;
            padding: 0 20px;
        }

        .hero img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* CONTAINER */
        .container {
            max-width: 950px;
            margin: auto;
            padding: 20px;
        }

        /* TOOL CARD */
        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.5);
            margin-top: -40px;
        }

        /* INPUT */
        .api-key input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            margin-bottom: 20px;
            background: white;
            color: black;
        }

        /* TOOL SELECTOR */
        .tool-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tool-selector button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2a2f55;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .tool-selector button.active {
            background: #5a67ff;
        }

        /* TEXTAREA */
        textarea {
            width: 100%;
            height: 180px;
            padding: 14px;
            border-radius: 8px;
            border: none;
            resize: vertical;
            font-size: 15px;
            background: white;
            color: black;
        }

        /* GENERATE BUTTON */
        .generate-btn {
            margin-top: 15px;
            padding: 14px;
            width: 100%;
            background: #5a67ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }

        /* RESULT AREA */
        .result {
            margin-top: 30px;
            background: #11142a;
            padding: 25px;
            border-radius: 8px;
            min-height: 120px;
        }

        /* Markdown Styling inside Result */
        .result h3 {
            color: #5a67ff;
            margin-top: 30px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
            font-family: sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result strong {
            color: #8c90ff;
        }

        .result p {
            margin-bottom: 15px;
            white-space: pre-wrap; /* Behåller radbrytningar från AI:n */
        }

        .result hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 30px 0;
        }

        .credits-box {
            background: rgba(90, 103, 255, 0.1);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(90, 103, 255, 0.3);
            margin-top: 30px;
            font-size: 14px;
            color: #8c90ff;
            text-align: center;
        }

        /* ACTION BUTTONS */
        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .actions button {
            background: #5a67ff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .actions button.copied {
            background: #2ecc71;
        }

        /* LOADER */
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #5a67ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #8c90ff;
            font-size: 14px;
            padding-bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="hero.png" alt="FlowForge AI Toolkit">
    </div>

    <div class="container">
        <div class="card">
            <div class="api-key">
                <input id="apikey" type="password" placeholder="Enter your API key">
            </div>

            <div class="tool-selector">
                <button onclick="setTool('repurpose')" class="active" id="repurpose">Repurpose</button>
                <button onclick="setTool('hooks')" id="hooks">Hook Generator</button>
                <button onclick="setTool('thread')" id="thread">Thread Writer</button>
                <button onclick="setTool('newsletter')" id="newsletter">Newsletter</button>
            </div>

            <textarea id="content" placeholder="Paste your content here..."></textarea>
            <button class="generate-btn" onclick="generate()">Generate Content</button>

            <div class="result" id="result">The result will appear here...</div>

            <div class="actions">
                <button onclick="copyResult()">Copy</button>
                <button onclick="downloadResult()">Download</button>
            </div>
        </div>

        <div class="footer">
            FlowForge AI Toolkit • 2026
        </div>
    </div>

    <script>
        let tool = "repurpose";

        function setTool(selected) {
            tool = selected;
            document.querySelectorAll(".tool-selector button").forEach(b => {
                b.classList.remove("active");
            });
            document.getElementById(selected).classList.add("active");
        }

        function copyResult() {
            const resultDiv = document.getElementById("result");
            const text = resultDiv.innerText;
            navigator.clipboard.writeText(text);

            const btn = document.querySelector(".actions button");
            btn.innerText = "Copied ✓";
            btn.classList.add("copied");

            setTimeout(() => {
                btn.innerText = "Copy";
                btn.classList.remove("copied");
            }, 2000);
        }

        function downloadResult() {
            const text = document.getElementById("result").innerText;
            const blob = new Blob([text], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "flowforge-output.txt";
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        function typeWriter(text) {
            const result = document.getElementById("result");
            result.innerHTML = "";
            
            // Temporary pre-wrap style during typing to keep spaces
            result.style.whiteSpace = "pre-wrap"; 
            
            let i = 0;
            const speed = 2; 

            function typing() {
                if (i < text.length) {
                    result.innerText += text.charAt(i);
                    i++;
                    if (i % 5 === 0) window.scrollTo(0, document.body.scrollHeight);
                    setTimeout(typing, speed);
                } else {
                    // Final formatting
                    const lastIndex = text.lastIndexOf('---');
                    
                    let contentPart = text;
                    let creditsPart = "";

                    if (lastIndex !== -1) {
                        contentPart = text.substring(0, lastIndex);
                        creditsPart = text.substring(lastIndex + 3); 
                    }
                    
                    let finalHTML = marked.parse(contentPart);
                    
                    if (creditsPart.trim().length > 0) {
                        finalHTML += `<div class="credits-box">${marked.parse(creditsPart)}</div>`;
                    }
                    
                    result.innerHTML = finalHTML;
                    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
                }
            }
            typing();
        }

        async function generate() {
            const content = document.getElementById("content").value;
            const apikey = document.getElementById("apikey").value;
            const result = document.getElementById("result");

            if (!apikey) { result.innerText = "Enter API key"; return; }
            if (!content) { result.innerText = "Enter content"; return; }

            result.innerHTML = '<div class="loader"></div>';

            try {
                const response = await fetch("https://api.flowforgeai.app/webhook/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: content,
                        tool: tool,
                        apikey: apikey
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    result.innerText = "Error: " + errorText;
                    return;
                }

                const data = await response.text();
                typeWriter(data);

            } catch (err) {
                result.innerText = "Connection error. Please check your Webhook URL.";
            }
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                const textarea = document.getElementById("content");
                if (document.activeElement === textarea) {
                    e.preventDefault();
                    generate();
                }
            }
        });
    </script>
</body>
</html>
